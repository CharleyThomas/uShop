name: C/C++ CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # NEW: Tell GitHub to harvest the compiled files from the build folder
    - name: Upload Compiled 3DS App
      uses: actions/upload-artifact@v4
      with:
        name: uShop-Build-${{ github.run_number }}
        path: |
          3DS_app/uShop.3dsx
          3DS_app/uShop.cia
