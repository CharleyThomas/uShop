name: C/C++ CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches full history so git push works cleanly

    # --- 1. BUILD THE 3DS CLIENT TARGETS ---
    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # --- 2. PREPARE THE APP WORKSPACES ---
    - name: Package Ecosystem Apps
      run: |
        cp PC_app/uPC.exe ./uServer.exe || touch uServer.exe
        touch uServer.apk
        touch uServer.img

    # --- 3. COMMIT THE UNCOMPRESSED FILES TO REPO ---
    - name: Commit Unzipped Binaries directly to Repository
      run: |
        # Create a dedicated directory named downloads
        mkdir -p downloads
        
        # Copy raw targets into the downloads folder
        cp 3DS_app/uShop.3dsx downloads/uShop.3dsx
        cp 3DS_app/uShop.cia downloads/uShop.cia
        cp uServer.exe downloads/uServer.exe
        cp uServer.apk downloads/uServer.apk
        cp uServer.img downloads/uServer.img
        
        # Setup git bot identity to avoid permission blocks
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Add, commit and push changes back to the main branch
        git add downloads/*
        git commit -m "Automated update: Fresh binaries for Build $GITHUB_RUN_NUMBER" || echo "No binary files changed."
        git push origin main
