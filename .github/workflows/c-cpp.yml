name: C/C++ CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Fix: Correctly navigate straight back to the main makerom folder after building libblz
    - name: Compile makerom from Source Zip
      run: |
        # Install the required Ubuntu dev packages
        sudo apt-get update && sudo apt-get install -y libmbedtls-dev libyaml-dev zlib1g-dev
        
        # Download and extract Project_CTR
        curl -L -o project-ctr.zip https://github.com/3DSGuy/Project_CTR/archive/refs/heads/master.zip
        unzip project-ctr.zip
        
        # Dynamically find and step into libblz, then compile it
        BLZ_PATH=$(find . -type d -name "libblz" | head -n 1)
        echo "Found libblz at: $BLZ_PATH"
        cd "$BLZ_PATH"
        make
        
        # Explicitly jump back to the main makerom folder (two directories up from libblz)
        cd .. && cd ..
        make
        
        # Deploy the finished binary to devkitPro's path
        sudo cp makerom /opt/devkitpro/tools/bin/makerom
        sudo chmod +x /opt/devkitpro/tools/bin/makerom

    # --- 1. BUILD THE 3DS CLIENT TARGETS ---
    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # --- 2. PREPARE THE APP WORKSPACES ---
    - name: Package Ecosystem Apps
      run: |
        cp PC_app/uPC.exe ./uServer.exe || echo "placeholder" > uServer.exe
        echo "Android placeholder build data" > uServer.apk
        echo "Raspberry Pi placeholder build data" > uServer.img

    # --- 3. AUTOMATICALLY PUBLISH RAW PRE-RELEASE ASSETS ---
    - name: Update Dev Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "Dev-Files"
        name: "Dev Files Test"
        draft: false
        prerelease: true
        make_latest: true
        files: |
          3DS_app/uShop.3dsx
          3DS_app/uShop.cia
          uServer.exe
          uServer.apk
          uServer.img
