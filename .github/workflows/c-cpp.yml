name: C/C++ CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Fix: Secure the pre-compiled binary directly from the official Project_CTR releases
    - name: Download and Install makerom Binary
      run: |
        # Download official v0.19.0 Ubuntu x86_64 build
        wget https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.19.0/makerom-v0.19.0-ubuntu_x86_64.zip
        
        # Unzip the target tool binary
        unzip makerom-v0.19.0-ubuntu_x86_64.zip
        
        # Move it straight into devkitPro's system tools path
        sudo cp makerom /opt/devkitpro/tools/bin/makerom
        sudo chmod +x /opt/devkitpro/tools/bin/makerom

    # --- 1. BUILD THE 3DS CLIENT TARGETS ---
    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # --- 2. PREPARE THE APP WORKSPACES ---
    - name: Package Ecosystem Apps
      run: |
        cp PC_app/uPC.exe ./uServer.exe || echo "placeholder" > uServer.exe
        echo "Android placeholder build data" > uServer.apk
        echo "Raspberry Pi placeholder build data" > uServer.img

    # --- 3. AUTOMATICALLY PUBLISH RAW PRE-RELEASE ASSETS ---
    - name: Update Dev Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "Dev-Files"
        name: "Dev Files Test"
        draft: false
        prerelease: true
        make_latest: true
        files: |
          3DS_app/uShop.3dsx
          3DS_app/uShop.cia
          uServer.exe
          uServer.apk
          uServer.img
