name: C/C++ CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. BUILD THE 3DS CLIENT TARGETS ---
    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # --- 2. PREPARE THE APP WORKSPACES ---
    - name: Package Ecosystem Apps
      run: |
        cp PC_app/uPC.exe ./uServer.exe || touch uServer.exe
        touch uServer.apk
        touch uServer.img

    # --- 3. UPLOAD AS SEPARATE ARTIFACTS (BACKUP) ---
    - name: Upload 3DSX File
      uses: actions/upload-artifact@v4
      with:
        name: uShop.3dsx
        path: 3DS_app/uShop.3dsx

    - name: Upload CIA File
      uses: actions/upload-artifact@v4
      with:
        name: uShop.cia
        path: 3DS_app/uShop.cia

    - name: Upload PC Server Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: uServer.exe
        path: uServer.exe

    - name: Upload Android Server App
      uses: actions/upload-artifact@v4
      with:
        name: uServer.apk
        path: uServer.apk

    - name: Upload Raspberry Pi Flashable Image
      uses: actions/upload-artifact@v4
      with:
        name: uServer.img
        path: uServer.img

    # --- 4. DEPLOY RAW DIRECT FILES TO GITHUB PAGES ---
    - name: Move files to Web Folder
      run: |
        mkdir -p public_download
        cp 3DS_app/uShop.3dsx public_download/uShop.3dsx
        cp 3DS_app/uShop.cia public_download/uShop.cia
        cp uServer.exe public_download/uServer.exe
        cp uServer.apk public_download/uServer.apk
        cp uServer.img public_download/uServer.img

    - name: Upload Static Web Assets
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'public_download'

    - name: Deploy Direct Links to Pages
      id: deployment
      uses: actions/deploy-pages@v4
