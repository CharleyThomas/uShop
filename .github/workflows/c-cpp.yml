name: C/C++ CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # Artifact 1: Separate 3DSX file (for Homebrew Launcher)
    - name: Upload 3DSX Homebrew File
      uses: actions/upload-artifact@v4
      with:
        name: uShop-Homebrew-3DSX
        path: 3DS_app/uShop.3dsx

    # Artifact 2: Separate CIA file (for Home Menu Installation / Citra)
    - name: Upload CIA Installer File
      uses: actions/upload-artifact@v4
      with:
        name: uShop-Installer-CIA
        path: 3DS_app/uShop.cia
