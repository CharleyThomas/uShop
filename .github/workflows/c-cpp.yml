name: C/C++ CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. BUILD THE 3DS CLIENT TARGETS ---
    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # --- 2. PREPARE THE APP WORKSPACES (With dummy text sizes) ---
    - name: Package Ecosystem Apps
      run: |
        cp PC_app/uPC.exe ./uServer.exe || echo "placeholder" > uServer.exe
        
        # Write dummy text into these files so their size is > 0 bytes
        echo "Android placeholder build data" > uServer.apk
        echo "Raspberry Pi placeholder build data" > uServer.img

    # --- 3. AUTOMATICALLY PUBLISH RAW PRE-RELEASE ASSETS ---
    - name: Update Dev Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "Dev-Files"
        name: "Dev Files Test"
        draft: false
        prerelease: true       # Bright orange Pre-release tag
        make_latest: true
        files: |
          3DS_app/uShop.3dsx
          3DS_app/uShop.cia
          uServer.exe
          uServer.apk
          uServer.img
        
