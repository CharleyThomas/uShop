name: C/C++ CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- 1. BUILD THE 3DS CLIENT TARGETS ---
    - name: Build 3DS App
      run: |
        cd 3DS_app
        make clean
        make

    # --- 2. PREPARE THE APP WORKSPACES ---
    - name: Package Ecosystem Apps
      run: |
        # Prepares your Windows PC executable placeholder
        cp PC_app/uPC.exe ./uServer.exe || touch uServer.exe
        
        # Prepares your Android App installation target (.apk)
        touch uServer.apk
        
        # Creates a placeholder for the official Raspberry Pi flashable image (.img)
        touch uServer.img

    # --- 3. SEPARATE & UPLOAD EVERY TARGET INDIVIDUALLY ---
    
    # 3DSX Homebrew Target
    - name: Upload 3DSX File
      uses: actions/upload-artifact@v4
      with:
        name: uShop.3dsx
        path: 3DS_app/uShop.3dsx

    # CIA Installer Target
    - name: Upload CIA File
      uses: actions/upload-artifact@v4
      with:
        name: uShop.cia
        path: 3DS_app/uShop.cia

    # PC Server Executable Target
    - name: Upload PC Server Windows Executable
      uses: actions/upload-artifact@v4
      with:
        name: uServer.exe
        path: uServer.exe

    # Android Package Target (Updated to .apk)
    - name: Upload Android Server App
      uses: actions/upload-artifact@v4
      with:
        name: uServer.apk
        path: uServer.apk

    # Raspberry Pi Imager Target
    - name: Upload Raspberry Pi Flashable Image
      uses: actions/upload-artifact@v4
      with:
        name: uServer.img
        path: uServer.img
